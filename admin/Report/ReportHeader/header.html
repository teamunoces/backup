<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Replication</title>
    <link rel="stylesheet" href="header.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="logo-container">
                <img src="../images/smcclogo.png" alt="SMCC Logo" class="school-logo">
                <img src="../images/Ceslogo.png" alt="CES Logo" class="ces-logo">
            </div>

            <div class="header-text">
                <h1 class="school-name">Saint Michael College of <span class="underline">Caraga</span></h1>
                <p class="address">Brgy. 4, Nasipit, Agusan del Norte, Philippines</p>
                <p class="contact">
                    Tel. Nos. +63 085 343-3251 / +63 085 283-3113 Fax No. +63 085 808-0892
                </p>
                <a href="http://www.smccnasipit.edu.ph" class="website">www.smccnasipit.edu.ph</a>
            </div>

            <div class="accreditation-container">
                <div class="socotec-box">
                    <img src="../images/ISOlogo.png" alt="SOCOTEC ISO 9001">
                </div>
                
            </div>
        </div>
        
        <div class="header-bottom">
            <h2 class="office-title">OFFICE OF THE COMMUNITY EXTENSION SERVICE</h2>
            <div class="double-line"></div>
        </div>
    </header>

</body>
</html>
