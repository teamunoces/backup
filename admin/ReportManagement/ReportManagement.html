<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Dashboard</title>
    <link rel="stylesheet" href="ReportManagement.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <!-- Header -->
    <iframe 
        src="../Profile/profile.html" 
        id="headerFrame"
        frameborder="0"
        scrolling="no"
        title="Header">
    </iframe>

    <!-- Sidebar -->
    <iframe 
        src="../Nav/navigation.html" 
        id="sidebarFrame"
        frameborder="0"
        scrolling="no"
        title="Navigation Sidebar">
    </iframe>

    <div class="container">

        <!-- Rows will be dynamically added by JS -->

        <div class="card section-green">
            
            <div class="filter-row">
                
                <span class="label">Type:</span>
                 <select id="approvedFilterSelect">  <!-- ADD THIS ID -->
                     <option>All type</option>
                    <option value="3 Year Development Plan">3 Year Development Plan</option>
                    <option value="Community Needs Assessment Consolidated Report">Community Needs Assessment Consolidated Report</option>
                    <option value="Monthly Accomplishment Report">Monthly Accomplishment Report</option>
                    <option value="Program Design">Program Design</option>
                </select>
            </div>
            
            <div class="table-container">
                <div class="table-header header-green">
                    <span>COORDINATOR'S APPROVED REPORTS</span>
                   
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Title</th>
                            <th>Department</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coordinatorapprovedTableBody">
                        <!-- Rows will be dynamically added by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card section-red">
            <div class="filter-row">
                <span class="label">Type:</span>
               <select id="rejectedFilterSelect">  <!-- ADD THIS ID -->
                    <option>All type</option>
                    <option value="3 Year Development Plan">3 Year Development Plan</option>
                    <option value="Community Needs Assessment Consolidated Report">Community Needs Assessment Consolidated Report</option>
                    <option value="Monthly Accomplishment Report">Monthly Accomplishment Report</option>
                    <option value="Program Design">Program Design</option>
                </select>
            </div>
            
            <div class="table-container">
                <div class="table-header header-red">
                    <span>COORDINATOR'S REJECTED REPORT</span>
                    <i class="fas fa-bars"></i>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Title</th>
                            <th>Department</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coordinatorrejectedTableBody">
                        <!-- Rows will be dynamically added by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="darkmode.js"></script>
    <script src="./js/feedback.js"></script>
    <script src="./js/get.js"></script>
   
</body>
</html>
