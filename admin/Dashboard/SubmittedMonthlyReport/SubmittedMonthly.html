<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submitted Report</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="SubmittedMonthly.css">
</head>
<body>

<div class="page-wrapper">
    <!-- Header -->
        <iframe 
            src="../../Profile/profile.html" 
            id="headerFrame"
            frameborder="0"
            scrolling="no"
            title="Header">
        </iframe>

    <!-- Sidebar -->
    <iframe src="../../Nav/navigation.html"
            id="sidebarFrame"
            frameborder="0"
            scrolling="no"
            title="Navigation Sidebar">
    </iframe>

    <!-- Main Content -->
    <div class="dashboard-main-content">

        <div class="container">
            <!-- Submitted Report Header -->
            <div class="section-header">
                Submitted Report
            </div>
            
            <!-- Chart Section -->
            <div class="chart-container">
                <div class="bar-wrapper">
                    <span class="bar-value">3</span>
                    <div class="bar" style="height: 30%;"></div>
                    <span class="month-label">January</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">2</span>
                    <div class="bar" style="height: 20%;"></div>
                    <span class="month-label">February</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">3</span>
                    <div class="bar" style="height: 30%;"></div>
                    <span class="month-label">March</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">4</span>
                    <div class="bar" style="height: 40%;"></div>
                    <span class="month-label">May</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">2</span>
                    <div class="bar" style="height: 20%;"></div>
                    <span class="month-label">June</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">6</span>
                    <div class="bar" style="height: 60%;"></div>
                    <span class="month-label">July</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">8</span>
                    <div class="bar" style="height: 80%;"></div>
                    <span class="month-label">August</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">9</span>
                    <div class="bar" style="height: 90%;"></div>
                    <span class="month-label">September</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">6</span>
                    <div class="bar" style="height: 60%;"></div>
                    <span class="month-label">October</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">3</span>
                    <div class="bar" style="height: 30%;"></div>
                    <span class="month-label">November</span>
                </div>
                <div class="bar-wrapper">
                    <span class="bar-value">2</span>
                    <div class="bar" style="height: 20%;"></div>
                    <span class="month-label">December</span>
                </div>
            </div>

            <!-- Departments Section Header -->
            <div class="section-header" style="margin-top: 30px;">
                Departments
                <div class="controls-group">
                    <div class="control-btn"><i class="fas fa-bars"></i></div>
                    <div class="control-btn active"><i class="fas fa-th-large"></i></div>
                </div>
            </div>

           
            <!-- Departments Grid -->
            <div class="departments-section">
                <div class="dept-grid">
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CCIS</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CTHM</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CAS</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CBM</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CTE</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CCJE</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">CCF</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">JHS</button>
                    <button class="dept-btn" onclick="location.href='/admin/Dashboard/SubmittedMonthlyReport/Departments.html'">SHS</button>
                </div>

            </div>

        </div>

    </div> <!-- End of dashboard-main-content -->

</div> <!-- End of page-wrapper -->
<script src="darkmode.js"></script>
</body>
</html>
